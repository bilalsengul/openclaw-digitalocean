# ═══════════════════════════════════════════════════════════════════
# 🦞 OpenClaw — Docker Compose
# ═══════════════════════════════════════════════════════════════════
# Usage:
#   cp example.env .env       # fill in your values
#   docker compose up -d      # start the bot
#   docker compose logs -f    # view logs
# ═══════════════════════════════════════════════════════════════════

services:
  openclaw:
    build: .
    container_name: ${PROJECT_NAME:-openclaw}
    restart: always
    env_file: .env
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - openclaw-state:/root/.openclaw
    ports:
      # SECURITY: Bind to localhost only — no inbound ports exposed.
      # If you need external access, use a reverse proxy (see install-learnings.md).
      - "127.0.0.1:3120:3120"

volumes:
  openclaw-state:
    driver: local
