# ═══════════════════════════════════════════════════════════════════
# 🦞 OpenClaw — Docker Compose
# ═══════════════════════════════════════════════════════════════════
# Usage:
#   cp example.env .env       # fill in your values
#   docker compose up -d      # start
#   docker compose logs -f    # view logs
#
# Dashboard: https://<droplet-ip>  (Caddy handles TLS automatically)
# ═══════════════════════════════════════════════════════════════════

services:
  openclaw:
    build: .
    container_name: ${PROJECT_NAME:-openclaw}
    restart: always
    env_file: .env
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - openclaw-state:/home/openclaw/.openclaw
    ports:
      # Gateway dashboard (localhost only — Caddy reverse-proxies external access)
      - "127.0.0.1:3120:3120"
      # Caddy shares this container's network namespace, so its
      # ports (80, 443) are exposed here.
      - "80:80"
      - "443:443"

  caddy:
    image: caddy:2-alpine
    container_name: ${PROJECT_NAME:-openclaw}-caddy
    restart: always
    # Share OpenClaw's network namespace so Caddy can reach
    # the gateway on localhost:3120 (it binds to loopback only).
    network_mode: "service:openclaw"
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS:-:443}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  openclaw-state:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
