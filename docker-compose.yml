# ═══════════════════════════════════════════════════════════════════
# 🦞 OpenClaw — Docker Compose
# ═══════════════════════════════════════════════════════════════════
# Usage:
#   cp example.env .env       # fill in your values
#   docker compose up -d      # start
#   docker compose logs -f    # view logs
#
# Dashboard: https://<droplet-ip>  (Caddy handles TLS automatically)
# ═══════════════════════════════════════════════════════════════════

services:
  openclaw:
    build: .
    container_name: ${PROJECT_NAME:-openclaw}
    restart: always
    env_file: .env
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - openclaw-state:/home/openclaw/.openclaw
    ports:
      # Expose gateway for internal Docker network access (Caddy)
      # and optionally for debugging (published port 18789).
      # If you want it private, remove the published port mapping.
      - "127.0.0.1:18789:18789"

  caddy:
    image: caddy:2-alpine
    container_name: ${PROJECT_NAME:-openclaw}-caddy
    restart: always
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS:-:443}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - openclaw

volumes:
  openclaw-state:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
